- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ firewall_default_incoming_policy }}"

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ firewall_default_outgoing_policy }}"

- name: Allow configured TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ firewall_port }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"
  loop_control:
    loop_var: firewall_port

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled
