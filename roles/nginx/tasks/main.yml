- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Create site directories
  ansible.builtin.file:
    path: "{{ site.root }}"
    state: directory
    mode: "0755"
  loop: "{{ nginx_sites }}"
  loop_control:
    loop_var: site

- name: Deploy vhost index pages
  ansible.builtin.template:
    src: vhost-index.html.j2
    dest: "{{ site.root }}/index.html"
    mode: "0644"
  loop: "{{ nginx_sites }}"
  loop_control:
    loop_var: site

- name: Deploy vhost configs
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ site.name }}"
    mode: "0644"
  loop: "{{ nginx_sites }}"
  loop_control:
    loop_var: site
  notify: Reload Nginx

- name: Enable vhost configs
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ site.name }}"
    dest: "/etc/nginx/sites-enabled/{{ site.name }}"
    state: link
  loop: "{{ nginx_sites }}"
  loop_control:
    loop_var: site
  notify: Reload Nginx

- name: Deploy nginx site config
  ansible.builtin.template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/default
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: Reload Nginx

- name: Deploy custom index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: "0644"
  notify: Reload Nginx

- name: Run nginx cleanup tasks
  ansible.builtin.import_tasks: cleanup.yml
